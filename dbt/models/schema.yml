version: 2

models:
  - name: stg_aircraft_positions
    description: Valid aircraft position events cleaned from OpenSky raw states.
    columns:
      - name: observed_at
        tests:
          - not_null
      - name: icao24
        tests:
          - not_null
      - name: origin_country
        tests:
          - not_null
  - name: int_aircraft_latest_state
    description: Latest known position for every aircraft.
    columns:
      - name: icao24
        tests:
          - not_null
          - unique
  - name: mart_country_airspace
    description: Country-level airspace activity metrics.
    columns:
      - name: origin_country
        tests: [not_null]
      - name: aircraft_count
        tests: [not_null]
  - name: mart_altitude_distribution
    description: Position event distribution by altitude band.
    columns:
      - name: altitude_band
        tests:
          - not_null
          - accepted_values:
              values: [ground, low, medium, cruise]
      - name: position_events
        tests: [not_null]
